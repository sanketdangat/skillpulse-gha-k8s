name: CI Pipeline (Fast + Secure)

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

jobs:

# ---------------- SECURITY (FAST FAIL) ----------------
  security:
    name: Security + Code Quality
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: "p/ci"

      - name: Hadolint Backend
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: backend/Dockerfile

      - name: Hadolint Frontend
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: frontend/Dockerfile

      - name: Go Vet
        working-directory: ./backend
        run: go vet ./...

      - name: Go Vulnerability Scan
        working-directory: ./backend
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          $(go env GOPATH)/bin/govulncheck ./...

      - name: Security Summary
        if: always()
        run: |
          echo "## Security + Code Quality" >> $GITHUB_STEP_SUMMARY
          echo "- Gitleaks: Done" >> $GITHUB_STEP_SUMMARY
          echo "- Semgrep: Done" >> $GITHUB_STEP_SUMMARY
          echo "- Govulncheck: Done" >> $GITHUB_STEP_SUMMARY
          echo "- Go Vet: Done" >> $GITHUB_STEP_SUMMARY
          echo "- Hadolint: Done" >> $GITHUB_STEP_SUMMARY


# ---------------- BACKEND BUILD ----------------
  backend:
    name: Backend Build + Scan + Push
    runs-on: ubuntu-latest
    needs: security

    steps:
      - uses: actions/checkout@v4

      - name: Docker Setup
        uses: docker/setup-buildx-action@v3

      - name: Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          load: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/skillpulse-backend:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/skillpulse-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKERHUB_USERNAME }}/skillpulse-backend:${{ github.sha }}
          severity: CRITICAL
          exit-code: 1
          ignore-unfixed: true

      - name: Push
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/skillpulse-backend:${{ github.sha }}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/skillpulse-backend:latest

      - name: Summary
        if: always()
        run: |
          echo "## Backend Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Image: skillpulse-backend" >> $GITHUB_STEP_SUMMARY
          echo "- Tag: ${GITHUB_SHA::7}" >> $GITHUB_STEP_SUMMARY


# ---------------- FRONTEND BUILD ----------------
  frontend:
    name: Frontend Build + Scan + Push
    runs-on: ubuntu-latest
    needs: security

    steps:
      - uses: actions/checkout@v4

      - name: Docker Setup
        uses: docker/setup-buildx-action@v3

      - name: Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          load: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/skillpulse-frontend:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/skillpulse-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKERHUB_USERNAME }}/skillpulse-frontend:${{ github.sha }}
          severity: CRITICAL
          exit-code: 1
          ignore-unfixed: true

      - name: Push
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/skillpulse-frontend:${{ github.sha }}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/skillpulse-frontend:latest

      - name: Summary
        if: always()
        run: |
          echo "## Frontend Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Image: skillpulse-frontend" >> $GITHUB_STEP_SUMMARY
          echo "- Tag: ${GITHUB_SHA::7}" >> $GITHUB_STEP_SUMMARY