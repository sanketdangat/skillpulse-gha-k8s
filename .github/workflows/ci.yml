name: CI Pipeline (Security + Build)

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

jobs:

  security:
    name: Security + Code Quality
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2

      - name: Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: "p/ci"

      - name: Hadolint Backend
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: backend/Dockerfile

      - name: Hadolint Frontend
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: frontend/Dockerfile

      - name: Go Vet
        working-directory: ./backend
        run: go vet ./...

      - name: Go Vulnerability Scan
        working-directory: ./backend
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          $(go env GOPATH)/bin/govulncheck ./...

  build:
    name: Build + Scan + Push
    runs-on: ubuntu-latest
    needs: security

    strategy:
      fail-fast: false
      matrix:
        include:
          - service: backend
            context: ./backend
            image: skillpulse-backend

          - service: frontend
            context: ./frontend
            image: skillpulse-frontend

    steps:
      - uses: actions/checkout@v4

      - name: Docker Setup
        uses: docker/setup-buildx-action@v3

      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          load: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image }}:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image }}:latest

      - name: Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image }}:${{ github.sha }}
          severity: CRITICAL
          exit-code: 1
          ignore-unfixed: true

      - name: Push Image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image }}:${{ github.sha }}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image }}:latest

      - name: GitHub Summary
        if: always()
        run: |
          echo "## CI Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Service | Image | Tag | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| ${{ matrix.service }} | ${{ matrix.image }} | ${GITHUB_SHA::7} | Success |" >> $GITHUB_STEP_SUMMARY