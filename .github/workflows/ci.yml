name: CI Pipeline (Security + Build)

on:
  push:
    branches: ["master"]
    paths-ignore:
      - "k8s/**"
      - "docs/**"
      - "**/*.md"
  workflow_dispatch:

# -------------------------
# SECURITY GATE
# -------------------------
jobs:
  security-gate:
    name: Security Gate (SAST + Secrets + Lint)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Secret Scan (Gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: SAST Scan (Semgrep)
        uses: returntocorp/semgrep-action@v1
        with:
          config: "p/ci"

      - name: Dockerfile Lint (Backend)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: backend/Dockerfile

      - name: Dockerfile Lint (Frontend)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: frontend/Dockerfile

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true
          cache-dependency-path: backend/go.sum

      - name: Go Vet
        working-directory: ./backend
        run: go vet ./...

      - name: Govulncheck
        working-directory: ./backend
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          $(go env GOPATH)/bin/govulncheck ./...

# -------------------------
# BACKEND PIPELINE
# -------------------------
  build-backend:
    name: Build Backend + Scan + Push
    runs-on: ubuntu-latest
    needs: security-gate

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set Short SHA
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Backend Image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          load: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/skillpulse-backend:${{ env.SHORT_SHA }}
            ${{ secrets.DOCKERHUB_USERNAME }}/skillpulse-backend:latest
          cache-from: type=gha,scope=backend
          cache-to: type=gha,scope=backend,mode=max

      - name: Trivy Scan Backend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKERHUB_USERNAME }}/skillpulse-backend:${{ env.SHORT_SHA }}
          severity: CRITICAL,HIGH
          exit-code: 1
          ignore-unfixed: true

      - name: Push Backend Image
        if: success()
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/skillpulse-backend:${{ env.SHORT_SHA }}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/skillpulse-backend:latest

      - name: Backend Summary
        if: always()
        run: |
          echo "## Backend Build Result" >> $GITHUB_STEP_SUMMARY
          echo "| Image | Tag | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| skillpulse-backend | $SHORT_SHA | Completed |" >> $GITHUB_STEP_SUMMARY

# -------------------------
# FRONTEND PIPELINE
# -------------------------
  build-frontend:
    name: Build Frontend + Scan + Push
    runs-on: ubuntu-latest
    needs: security-gate

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set Short SHA
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Frontend Image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          load: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/skillpulse-frontend:${{ env.SHORT_SHA }}
            ${{ secrets.DOCKERHUB_USERNAME }}/skillpulse-frontend:latest
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max

      - name: Trivy Scan Frontend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKERHUB_USERNAME }}/skillpulse-frontend:${{ env.SHORT_SHA }}
          severity: CRITICAL,HIGH
          exit-code: 1
          ignore-unfixed: true

      - name: Push Frontend Image
        if: success()
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/skillpulse-frontend:${{ env.SHORT_SHA }}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/skillpulse-frontend:latest

      - name: Frontend Summary
        if: always()
        run: |
          echo "## Frontend Build Result" >> $GITHUB_STEP_SUMMARY
          echo "| Image | Tag | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| skillpulse-frontend | $SHORT_SHA | Completed |" >> $GITHUB_STEP_SUMMARY