name: CI Pipeline (Security + Build)

on:
  push:
    branches: ["master"]
    paths-ignore:
      - "k8s/**"
      - "docs/**"
      - "**/*.md"

  workflow_dispatch:

jobs:

  # =========================
  # SECURITY + CODE QUALITY
  # =========================
  security:
    name: Security + Code Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Gitleaks Secret Scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Semgrep SAST Scan
        uses: returntocorp/semgrep-action@v1
        with:
          config: "p/ci"

      - name: Hadolint Backend
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: backend/Dockerfile

      - name: Hadolint Frontend
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: frontend/Dockerfile

      - name: Setup Go Environment
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true
          cache-dependency-path: backend/go.sum

      - name: Go Vet
        working-directory: ./backend
        run: go vet ./...

      - name: Go Vulnerability Scan
        working-directory: ./backend
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          $(go env GOPATH)/bin/govulncheck ./...

  # =========================
  # BACKEND BUILD
  # =========================
  backend:
    name: Backend Build + Scan + Push
    runs-on: ubuntu-latest
    needs: security

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set Short SHA
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: DockerHub Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Backend Image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          load: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/skillpulse-backend:${{ env.SHORT_SHA }}
            ${{ secrets.DOCKERHUB_USERNAME }}/skillpulse-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy Scan Backend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKERHUB_USERNAME }}/skillpulse-backend:${{ env.SHORT_SHA }}
          severity: CRITICAL
          exit-code: 1
          ignore-unfixed: true

      - name: Push Backend Image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/skillpulse-backend:${{ env.SHORT_SHA }}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/skillpulse-backend:latest

      - name: CI Summary Backend
        if: always()
        run: |
          echo "## CI Pipeline Result" >> $GITHUB_STEP_SUMMARY
          echo "| Service | Image | Tag | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| backend | skillpulse-backend | $SHORT_SHA | Completed |" >> $GITHUB_STEP_SUMMARY

  # =========================
  # FRONTEND BUILD
  # =========================
  frontend:
    name: Frontend Build + Scan + Push
    runs-on: ubuntu-latest
    needs: security

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set Short SHA
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: DockerHub Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Frontend Image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          load: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/skillpulse-frontend:${{ env.SHORT_SHA }}
            ${{ secrets.DOCKERHUB_USERNAME }}/skillpulse-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy Scan Frontend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKERHUB_USERNAME }}/skillpulse-frontend:${{ env.SHORT_SHA }}
          severity: CRITICAL
          exit-code: 1
          ignore-unfixed: true

      - name: Push Frontend Image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/skillpulse-frontend:${{ env.SHORT_SHA }}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/skillpulse-frontend:latest

      - name: CI Summary Frontend
        if: always()
        run: |
          echo "## CI Pipeline Result" >> $GITHUB_STEP_SUMMARY
          echo "| Service | Image | Tag | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| frontend | skillpulse-frontend | $SHORT_SHA | Completed |" >> $GITHUB_STEP_SUMMARY