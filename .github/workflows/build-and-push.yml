name: Build, Scan & Push

on:
  workflow_run:
    workflows: ["Security & Quality Checks"]
    types:
      - completed

  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - service: backend
            context: ./backend
            image: skillpulse-backend

          - service: frontend
            context: ./frontend
            image: skillpulse-frontend

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: DockerHub Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          load: true
          tags: ${{ matrix.image }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy Image Scan
        uses: aquasecurity/trivy-action@0.22.0
        with:
          image-ref: ${{ matrix.image }}:${{ github.sha }}
          severity: HIGH,CRITICAL
          exit-code: 1
          ignore-unfixed: true

      - name: Tag & Push Image
        run: |
          docker tag ${{ matrix.image }}:${{ github.sha }} \
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image }}:latest

          docker push ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image }}:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image }}:${{ github.sha }}